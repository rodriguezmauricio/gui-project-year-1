# ================================================
# .github/workflows/update-progress.yml
#
# Watches for commits to main that contain [done:N]
# or [done:N,M] in the message. Updates progress.json
# and commits the change back automatically.
#
# Example commit messages:
#   git commit -m "chore: set up repo [done:1,2,3]"
#   git commit -m "feat: add hero section [done:9]"
#   git commit -m "feat: save to localStorage [done:11,12]"
# ================================================

name: Update progress

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse commit message and update progress.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const msg     = context.payload.head_commit.message;
            const author  = context.payload.head_commit.author.name;
            const sha     = context.sha.substring(0, 7);

            // Ignore commits made by this action to avoid infinite loops
            if (msg.includes('[skip ci]')) {
              console.log('Bot commit — skipping.');
              return;
            }

            // Match [done:1] or [done:1,2,3]
            const match = msg.match(/\[done:([\d,\s]+)\]/);
            if (!match) {
              console.log('No [done:N] tag found in commit message — skipping.');
              return;
            }

            const steps    = match[1].split(',').map(s => parseInt(s.trim())).filter(Boolean);
            const progress = JSON.parse(fs.readFileSync('progress.json', 'utf8'));

            let changed = false;
            steps.forEach(step => {
              if (!progress.done.includes(step)) {
                progress.done.push(step);
                progress.log.push({
                  step,
                  author,
                  sha,
                  date: new Date().toISOString()
                });
                changed = true;
                console.log(`Marked step ${step} done by ${author}`);
              } else {
                console.log(`Step ${step} already done — skipping.`);
              }
            });

            if (!changed) return;

            progress.done.sort((a, b) => a - b);
            fs.writeFileSync('progress.json', JSON.stringify(progress, null, 2));

      - name: Commit updated progress.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet progress.json || (
            git add progress.json &&
            git commit -m "chore: update progress [skip ci]" &&
            git push
          )
