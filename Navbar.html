<!--
The <nav> element is a semantic HTML tag.
    It tells browsers,search engines, and screen
-->
<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- this defines the character encoding for proper text display-->
         <meta charset="UTF-8">

         <!-- helps make the site responsive on moblile devices -->
          <meta name="viewport" content="width=device-width, inital-scale=1.0">

          <!--
          Page title shown in the browser tab-->
          <title>Home</title>
          
          <!--  External fonts for stying helps improve the ui design-->
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/syne@5/700.css">
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5/400.css">

            <!-- link to our main css file-->
            <link rel="stylesheet" href="=css/styles.css"
    </head>

    <body>
        <!-- navigation bar (semantic)-->
         <!-- is used instead of a div because it clearly defines navigation.
          which will help accesibility and help screen readers-->

          <nav class="navbar">

                <!-- website logo / name -->
                 <div class="=nav-logo">Gui Project</div>

                 <!-- Navigation links grouped as a list -->
                  <ul class="nav-links">

                    <li>
                        <!--when "active" the class will show current page-->
                        <a href="index.html" class="nav-link active">Home</a>
                    </li>

                    <li>
                        <a href="saved.html" class="nav-link">Browse</a>
                    </li>
                    
                    <li>
                        <a href="saved.html" class="nav-link">
                            <!--I used this span as dynamic badge,JavaScript can update this number when items are saved -->
                                Saved <span id="savedCount">0</span>
                        </a>
                    </li>

                  </ul>
          </nav>
          <!-- MAIN CONTENT AREA -->
      <main> is a semantic tag for the primary content of the page.
      Each page will have different content here.
    
    <main>
        <h1>Welcome to MySite</h1>
        <p>This is your homepage content.</p>
    </main>

    
    <!-- FOOTER (Semantic) -->
    <!--- 
      <footer> defines the bottom section of the page.
      Typically contains copyright or extra info.
    -->
    <footer class="footer">
        <p>&copy; 2026 MySite. All rights reserved.</p>
    </footer>

    <!-- JavaScript file for interactivity (e.g. saved counter) -->
    <script src="js/mauricioJs.js"></script>

</body>
</html>
